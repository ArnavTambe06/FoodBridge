name: foodbridge
description: "Connecting surplus food with those in need."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0

  # Backend & Auth
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0


  # Maps & Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Image Handling
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1
  http: ^1.2.0

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Storage & Utilities
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  connectivity_plus: ^7.0.0
  shimmer: ^3.0.0
  google_fonts: ^8.0.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_map: ^7.0.2
latlong2: ^0.9.1

connectivity_plus: ^6.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/

# App Icon config
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#456237"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# Splash screen config
flutter_native_splash:
  color: "#FBF9F2"
  image: "assets/icon/app_icon.png"
  color_dark: "#FBF9F2"
  android_12:
    image: "assets/icon/app_icon.png"
    icon_background_color: "#FBF9F2"
  fullscreen: false